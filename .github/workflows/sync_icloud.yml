name: Sync iCloud Calendar

on:
  schedule:
    - cron: '0 * * * *' # Ejecutar cada hora
  workflow_dispatch: # Permite ejecución manual desde GitHub

permissions:
  contents: write

jobs:
  sync-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download iCloud Calendar
        run: |
          mkdir -p pec/data
          # Convertimos webcal a https y descargamos
          curl -sL "https://p45-caldav.icloud.com/published/2/MTIwODExNDM2MjEyMDgxMQ_N9OFdZ615LKgUgfNU-ZbNqxZszYUzZmTsDzOLNxStl1QL5QEKu-Q4LXCaLKwWD5IJyDUd4nUexcMD7flFefw" > pec/data/icloud.ics

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add pec/data/icloud.ics
          # Si hay diferencias en el archivo descargado, commitea y empuja
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync iCloud Calendar [skip ci]" && git push)
