<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Horarios — CEB 5/4</title>
  <link rel="stylesheet" href="css/generador.css">
</head>
<body>

<!-- ═══════════════════════════════════════
     SIDEBAR
     ═══════════════════════════════════════ -->
<nav id="gen-sidebar">
  <div class="gen-sidebar-header">
    <div class="gen-sidebar-logo">Generador de Horarios</div>
    <div class="gen-sidebar-sub">CEB 5/4 — Sistema de armado</div>
  </div>

  <div class="gen-nav">

    <!-- VISTAS -->
    <div class="gen-nav-section">Vistas</div>

    <button class="gen-nav-item" data-mod="dashboard">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      Dashboard
    </button>

    <button class="gen-nav-item" data-mod="armado">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18"/><path d="M3 15h18"/>
        <path d="M9 3v18"/><path d="M15 3v18"/>
      </svg>
      Armar horarios
    </button>

    <button class="gen-nav-item" data-mod="conflictos">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      Conflictos
    </button>

    <button class="gen-nav-item" data-mod="reportes">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      Reportes
    </button>

    <!-- CATÁLOGOS -->
    <div class="gen-nav-section">Catálogos</div>

    <button class="gen-nav-item" data-mod="docentes">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Docentes
    </button>

    <button class="gen-nav-item" data-mod="grupos">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Grupos
    </button>

    <button class="gen-nav-item" data-mod="materias">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      Materias / UAC
    </button>

    <button class="gen-nav-item" data-mod="aulas">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18"/><path d="M9 21V9"/>
      </svg>
      Aulas
    </button>

    <!-- PLANIFICACIÓN -->
    <div class="gen-nav-section">Planificación</div>

    <button class="gen-nav-item" data-mod="carga">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      Carga horaria
    </button>

    <button class="gen-nav-item" data-mod="disponibilidad">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Disponibilidad
    </button>

    <!-- SISTEMA -->
    <div class="gen-nav-section">Sistema</div>

    <button class="gen-nav-item" data-mod="config">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
      </svg>
      Configuración
    </button>
  </div>

  <div class="gen-sidebar-footer">
    <button id="gen-admin-logout" class="gen-btn gen-btn-sm" style="width:100%;justify-content:center">
      Cerrar sesión admin
    </button>
  </div>
</nav>

<!-- ═══════════════════════════════════════
     CONTENIDO PRINCIPAL
     ═══════════════════════════════════════ -->
<div id="gen-app-content">

  <!-- TOPBAR -->
  <header id="gen-topbar">
    <button id="gen-sidebar-toggle" aria-label="Menú">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="gen-topbar-ciclo">
      <span class="gen-topbar-ciclo-label">Ciclo:</span>
      <span id="gen-ciclo-display">—</span>
      <button id="gen-ciclo-btn">Cambiar</button>
    </div>
  </header>

  <!-- MAIN -->
  <main id="gen-main-content">
    <div class="gen-loading">
      <div class="gen-spinner"></div>
      <span>Iniciando…</span>
    </div>
  </main>
</div>

<!-- ═══════════════════════════════════════
     MODAL GENÉRICO
     ═══════════════════════════════════════ -->
<div id="gen-modal" role="dialog" aria-modal="true">
  <div class="gen-modal-box">
    <div class="gen-modal-header">
      <span id="gen-modal-title" class="gen-modal-title"></span>
      <button id="gen-modal-close" class="gen-modal-close" aria-label="Cerrar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="gen-modal-body"></div>
    <div id="gen-modal-footer"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     TOAST CONTAINER
     ═══════════════════════════════════════ -->
<div id="gen-toast-container" aria-live="polite"></div>

<!-- ═══════════════════════════════════════
     SCRIPTS
     ═══════════════════════════════════════ -->
<!-- API Client — configura GEN_API_URL aquí -->
<script src="js/api_generador.js"></script>
<!-- App Bootstrap + Router -->
<script src="js/app_generador.js"></script>
<!-- Módulos (orden no importa, se registran solos) -->
<script src="js/mod_dashboard.js"></script>
<script src="js/mod_config.js"></script>
<script src="js/mod_docentes.js"></script>
<script src="js/mod_grupos.js"></script>
<script src="js/mod_materias.js"></script>
<script src="js/mod_aulas.js"></script>
<script src="js/mod_carga.js"></script>
<script src="js/mod_disponibilidad.js"></script>
<script src="js/mod_armado.js"></script>
<script src="js/mod_conflictos.js"></script>
<script src="js/mod_reportes.js"></script>

</body>
</html>
